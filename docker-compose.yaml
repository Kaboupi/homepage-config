services:

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: ${HOMEPAGE_NAME:-homepage}
    ports:
      - ${HOMEPAGE_PORT:-3000}:3000
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
    - HOMEPAGE_ALLOWED_HOSTS=gethomepage.dev,${HOMELAB_ADDRESS}:${HOMEPAGE_PORT},${HOMELAB_DOMAIN:-my.home.lab}:${HOMEPAGE_PORT}

  vert:
    container_name: ${VERT_NAME}
    image: ghcr.io/vert-sh/vert:latest
    ports:
      - ${VERT_PORT:-3000}:80
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: ${PORTAINER_NAME:-portainer}
    ports:
      - ${PORTAINER_PORT_UI:-9000}:9000
      - ${PORTAINER_PORT_API:-9443}:9443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - portainer_data:/data:rw
    restart: unless-stopped

  it-tools:
    image: corentinth/it-tools
    container_name: ${IT_TOOLS_NAME:-it-tools}
    ports:
      - ${IT_TOOLS_PORT:-8080}:80
    restart: unless-stopped

  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: ${GRAFANA_NAME:-monitoring-grafana}
    ports:
      - ${GRAFANA_PORT:-3000}:3000
    volumes:
      - ./monitoring/grafana/dashboards:/etc/dashboards
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsSL http://127.0.0.1:3000 || exit 1"]
      interval: 1m
      timeout: 30s
      retries: 2
      start_period: 30s
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ${NODE_EXPORTER_NAME:-monitoring-node-exporter}
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: ${PROMETHEUS_NAME:-monitoring-prometheus}
    hostname: ${PROMETHEUS_HOSTNAME:-prometheus}
    ports:
      - ${PROMETHEUS_PORT:-9090}:9090
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus:/prometheus:rw
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped

volumes:
  portainer_data:
  prometheus:


target-version = "py311"

line-length = 100

exclude = [
    ".git",
    ".cache",
    "venv",
    ".pypy_cache",
    ".ruff_cache",
    "__pypackages__",
]

[lint]
select = [
    "E",   # pycodestyle err
    "W",   # pycodestyle warn
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "RUF", # ruff specific
]

ignore = [
    "D100",
    "D103",
]

fixable = ["ALL"]
unfixable = []

[lint.isort]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
known-first-party = ["gen"]

[lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "argparse.ArgumentParser"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

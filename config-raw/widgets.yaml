---
# - greeting:
#     text_size: xl
#     text: Welcome

- logo:
    icon: arch-linux.svg
    href: http://github.com/Kaboupi/homepage-config
    target: _blank

- greeting:
    text_size: xl
    href: http://github.com/Kaboupi/homepage-config
    text: Welcome!

- resources:
    cpu: true
    memory: true
    disk: /

- search:
    provider: custom
    url: https://ya.ru/search?text=
    target: _blank
    showSearchSuggestions: true

- datetime:
    href: https://youtube.com/
    text_size: xl
    format:
      timeStyle: short
      hourCycle: h23

- openmeteo:
    label: {{ LOCATION_NAME }}
    latitude: {{ LOCATION_LATITUDE }}
    longitude: {{ LOCATION_LONGITUDE }}
    timezone: {{ TIMEZONE }}
    units: metric
    cache: 5


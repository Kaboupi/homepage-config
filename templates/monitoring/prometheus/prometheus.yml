global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['{{ NODE_EXPORTER_HOSTNAME }}:9100']

  - job_name: 'watchtower'
    static_configs:
      - targets: ['{{ WATCHTOWER_HOSTNAME }}:8080']
    authorization:
      credentials: '{{ WATCHTOWER_KEY }}'
